gatling {
  data {
    writers = [console, file, graphite]

    console {
      light = false
    }

    file {
      bufferSize = 8192
    }

    graphite {
      light = false
      host = "localhost"
      port = 2003
      protocol = "tcp"
      rootPathPrefix = "gatling"
      bufferSize = 8192
      writePeriod = 1
    }
  }
}
