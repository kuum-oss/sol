name: JMH Regression

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  run-benchmarks:
    name: Run JMH Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Create CI benchmark baseline
        run: >
          ./gradlew :performance-tests:benchmarks:runBenchmarks
          -Djmh.result.file=reports/jmh_ci_baseline_run.json
          -Djmh.baseline.file=reports/jmh_ci_baseline.json
          -Djmh.update.baseline=true

      - name: Run benchmark regression check
        run: >
          ./gradlew :performance-tests:benchmarks:runBenchmarks
          -Djmh.result.file=reports/jmh_results.json
          -Djmh.baseline.file=reports/jmh_ci_baseline.json
          -Djmh.regression.threshold.percent=10

      - name: Upload JMH reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmh-reports
          path: |
            reports/jmh_results.json
            reports/jmh_baseline.json
            reports/jmh_ci_baseline.json
            reports/jmh_ci_baseline_run.json
            performance-tests/benchmarks/reports/*.json
          if-no-files-found: ignore
